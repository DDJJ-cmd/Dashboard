<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FY2026 PL Forecast Dashboard</title>

<!-- React CDN -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<!-- Recharts UMD -->
<script src="https://unpkg.com/recharts/umd/Recharts.min.js"></script>

<!-- Babel (JSX変換用) -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
html,body{
  margin:0;
  padding:0;
  background:#0b0f1a;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">

const {
  BarChart, Bar, Line, XAxis, YAxis, CartesianGrid, Tooltip,
  Legend, ResponsiveContainer, Cell, ComposedChart,
  Area, ReferenceLine
} = Recharts;

const RAW = {
  ht: [
    {h:"MOH",fg:6396374929,fp:1671678597,pg:6406069022,pp:1674278728,bg:6402135920,bp:1672536157,lg:6146997918,lp:1440123137,gm:26.1,oc:88.5,ad:26201,rp:23175,poc:88.7,pad:26204,prp:23253,boc:88.8,bad:26309,brp:23356,loc:82.8,lad:26494,lrp:21936,co:1448685570,la:837927776,oe:1061788895,na:1376294091},
    {h:"NOH",fg:3617394301,fp:2039288331,pg:3616827637,pp:2037437804,bg:3678888675,bp:2043209643,lg:3226043619,lp:1833888840,gm:56.4,oc:92.8,ad:29294,rp:27186,poc:93.1,pad:29201,prp:27200,boc:93.1,bad:29501,brp:27466,loc:92.1,lad:27675,lrp:25486,co:96110993,la:120944133,oe:790625429,na:570425415}
  ],
  mt: [
    {m:"Jan",fg:5127403792,fp:1641006262,pg:5127403792,pp:1641006262,bg:5095209211,bp:1645094802,lg:5067354944,lp:1752499362},
    {m:"Feb",fg:5198612090,fp:1723026923,pg:5178816606,pp:1683864693,bg:5128119627,bp:1658656093,lg:4919956433,lp:1650925137}
  ]
};

const B = 1e9;
const C = {
  bg:'#0b0f1a',
  card:'#111827',
  border:'#1e293b',
  accent:'#3b82f6',
  green:'#10b981',
  amber:'#f59e0b',
  prevFC:'#a78bfa',
  t1:'#f1f5f9',
  t2:'#94a3b8',
  grid:'#1e293b'
};

function App(){

  const hotels = RAW.ht;
  const monthly = RAW.mt;

  const totalGOR = hotels.reduce((s,h)=>s+h.fg,0);
  const totalGOP = hotels.reduce((s,h)=>s+h.fp,0);
  const gopMargin = totalGOP/totalGOR*100;

  return(
    <div style={{padding:30,color:C.t1}}>
      <h1 style={{marginBottom:30}}>FY2026 PL Forecast Dashboard</h1>

      {/* Summary */}
      <div style={{display:'flex',gap:20,marginBottom:40}}>
        <Card label="Total GOR" value={formatB(totalGOR)}/>
        <Card label="Total GOP" value={formatB(totalGOP)}/>
        <Card label="GOP Margin" value={gopMargin.toFixed(1)+'%'}/>
      </div>

      {/* Hotel GOR Chart */}
      <Section title="GOR by Hotel">
        <ResponsiveContainer width="100%" height={300}>
          <BarChart data={hotels}>
            <CartesianGrid strokeDasharray="3 3" stroke={C.grid}/>
            <XAxis dataKey="h" stroke={C.t2}/>
            <YAxis tickFormatter={(v)=> (v/B).toFixed(0)+'B'} stroke={C.t2}/>
            <Tooltip formatter={(v)=>formatB(v)}/>
            <Bar dataKey="fg" fill={C.accent}/>
            <Bar dataKey="pg" fill={C.prevFC}/>
            <Bar dataKey="bg" fill={C.amber}/>
          </BarChart>
        </ResponsiveContainer>
      </Section>

      {/* Monthly */}
      <Section title="Monthly GOR">
        <ResponsiveContainer width="100%" height={300}>
          <ComposedChart data={monthly}>
            <CartesianGrid strokeDasharray="3 3" stroke={C.grid}/>
            <XAxis dataKey="m" stroke={C.t2}/>
            <YAxis tickFormatter={(v)=> (v/B).toFixed(0)+'B'} stroke={C.t2}/>
            <Tooltip formatter={(v)=>formatB(v)}/>
            <Line type="monotone" dataKey="fg" stroke={C.accent}/>
            <Line type="monotone" dataKey="pg" stroke={C.prevFC}/>
            <Line type="monotone" dataKey="bg" stroke={C.amber}/>
          </ComposedChart>
        </ResponsiveContainer>
      </Section>
    </div>
  );
}

function Card({label,value}){
  return(
    <div style={{
      background:C.card,
      padding:20,
      borderRadius:10,
      minWidth:200
    }}>
      <div style={{color:C.t2,fontSize:12,marginBottom:5}}>{label}</div>
      <div style={{fontSize:22,fontWeight:700}}>{value}</div>
    </div>
  );
}

function Section({title,children}){
  return(
    <div style={{marginBottom:50}}>
      <h2 style={{marginBottom:20}}>{title}</h2>
      {children}
    </div>
  );
}

function formatB(v){
  return "¥"+(v/B).toFixed(1)+"B";
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
